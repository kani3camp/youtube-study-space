# Dependabot configuration
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# NOTE: このファイルは authoritative な設定です。ここに記載されていない
#       ecosystem / directory の version update は走りません。新しい
#       package.json や Dockerfile を追加したときは必ずここにも追記。
version: 2
updates:
  # =========================
  # Docker ベースイメージ（#693: 再現可能ビルドのため digest 固定を自動更新）
  # =========================
  - package-ecosystem: docker
    directory: /system
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    commit-message:
      prefix: build(deps)
    open-pull-requests-limit: 5

  # =========================
  # Go modules
  # minor / patch はまとめる
  # major は個別PR
  # =========================
  - package-ecosystem: gomod
    directory: /system
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    commit-message:
      prefix: build(deps)
    open-pull-requests-limit: 10
    groups:
      go-minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # =========================
  # npm / pnpm projects
  # minor / patch は全サブプロジェクト横断でまとめる
  # major は個別PR
  # =========================
  - package-ecosystem: npm
    directories:
      - /youtube-monitor
      - /aws-cdk
      - /docs-site
      - /tools/menu-image-generator
      - /tools/video-maker/1000-minutes-simulator
      - /tools/figma-plugin/room-layout-analyzer
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    commit-message:
      prefix: build(deps)
    open-pull-requests-limit: 10
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # =========================
  # GitHub Actions
  # minor / patch はまとめる
  # major は個別PR
  # =========================
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    commit-message:
      prefix: build(deps)
    open-pull-requests-limit: 5
    groups:
      github-actions-minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
