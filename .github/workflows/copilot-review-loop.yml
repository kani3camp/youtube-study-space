name: Copilot Review Loop

on:
  pull_request_target:
    types:
      - labeled
      - synchronize
      - reopened
      - ready_for_review
  pull_request_review:
    types:
      - submitted
  pull_request_review_comment:
    types:
      - created
  workflow_run:
    workflows:
      - Check
      - Test
      - Test docs deployment
    types:
      - completed

permissions:
  contents: read
  issues: read
  pull-requests: read
  checks: read
  statuses: read

concurrency:
  group: copilot-review-loop-${{ github.repository }}-${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number || github.run_id }}
  cancel-in-progress: false

jobs:
  orchestrate:
    name: Orchestrate Copilot-Cursor Loop
    if: >
      (github.event_name != 'workflow_run' &&
      github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0] &&
      github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Collect new Copilot comments and CI failures
        id: collect
        uses: actions/github-script@v7
        env:
          CURSOR_TRIGGER_LOGIN: ${{ vars.CURSOR_TRIGGER_LOGIN }}
        with:
          script: |
            const pullNumber =
              context.payload.pull_request?.number ??
              context.payload.workflow_run?.pull_requests?.[0]?.number;
            if (!pullNumber) {
              core.notice(`No pull request context for event ${context.eventName}.`);
              core.setOutput('action', 'none');
              return;
            }

            const { owner, repo } = context.repo;
            const { data: pullRequest } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullNumber,
            });
            const scriptPath = '.github/scripts/copilot-review-loop.js';
            let file;
            let scriptRef = pullRequest.base.sha;
            try {
              ({ data: file } = await github.rest.repos.getContent({
                owner,
                repo,
                path: scriptPath,
                ref: scriptRef,
              }));
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              // Bootstrap fallback for the PR that first introduces this script.
              scriptRef = pullRequest.head.sha;
              core.notice(
                `Trusted base ref ${pullRequest.base.sha} does not contain ${scriptPath}; ` +
                  `falling back to PR head ${scriptRef} for bootstrap.`,
              );
              ({ data: file } = await github.rest.repos.getContent({
                owner,
                repo,
                path: scriptPath,
                ref: scriptRef,
              }));
            }
            if (Array.isArray(file) || typeof file.content !== 'string') {
              throw new Error(
                `Failed to load copilot-review-loop.js from ref ${scriptRef}.`,
              );
            }

            const source = Buffer.from(file.content, file.encoding || 'base64').toString('utf8');
            const Module = require('module');
            const modulePath = `${process.cwd()}/${scriptPath}`;
            const loadedModule = new Module(modulePath);
            loadedModule.filename = modulePath;
            loadedModule.paths = Module._nodeModulePaths(process.cwd());
            loadedModule._compile(source, modulePath);
            const run = loadedModule.exports;
            await run({ github, context, core });

      - name: Validate Cursor trigger PAT
        if: steps.collect.outputs.action == 'comment' || steps.collect.outputs.action == 'stop'
        env:
          CURSOR_TRIGGER_PAT: ${{ secrets.CURSOR_TRIGGER_PAT }}
        run: |
          if [ -z "${CURSOR_TRIGGER_PAT}" ]; then
            echo "CURSOR_TRIGGER_PAT is required to post top-level PR comments as the service account." >&2
            exit 1
          fi

      - name: Post PR conversation comment via service account
        if: steps.collect.outputs.action == 'comment' || steps.collect.outputs.action == 'stop'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CURSOR_TRIGGER_PAT }}
          script: |
            await github.rest.issues.createComment({
              owner: '${{ github.repository_owner }}',
              repo: '${{ github.event.repository.name }}',
              issue_number: Number('${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number }}'),
              body: ${{ toJSON(steps.collect.outputs.comment_body) }},
            });

      - name: Log skipped state
        if: steps.collect.outputs.action == 'none'
        run: echo "No new actionable Copilot comments or CI failures for an ai-loop PR."

    # Required configuration:
    # - CURSOR_TRIGGER_PAT: PAT for the service account that posts top-level PR comments with @cursor.
    # - CURSOR_TRIGGER_LOGIN: repository variable for that service account login. This is read by the
    #   collect step so the loop can trust only metadata comments authored by the trigger account.
    # Security note:
    # - The collect step loads .github/scripts/copilot-review-loop.js from the PR base SHA.
    #   If that ref does not contain the script yet (for the PR that first introduces it), the step falls back
    #   to the PR head SHA only for bootstrap. PAT is still not exposed to the collect step.
    # - The script only trusts loop metadata from comments authored by that service account.
    # - The script also ignores PRs whose head repository differs from github.repository.
    # - The job itself is limited to same-repo PR contexts, including workflow_run events linked to pull requests.
