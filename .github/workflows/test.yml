name: Test

on:
  pull_request:
  workflow_dispatch:

jobs:
  system-go-test:
    name: System Go Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: system
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: system/go.mod
          cache: true
          cache-dependency-path: |
            system/go.sum
            system/go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -shuffle=on -v ./...

  room-image-prompt-go-test:
    name: Room Image Prompt Go Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tools/room-image-prompt
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/room-image-prompt/go.mod
          cache: true
          cache-dependency-path: tools/room-image-prompt/go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -shuffle=on -v ./...

      - name: Build CLI
        run: go build -o /dev/null ./cmd/room-image-prompt

  youtube-monitor-test:
    name: YouTube Monitor Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: youtube-monitor
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: youtube-monitor/package.json
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: youtube-monitor/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test

  youtube-monitor-build:
    name: YouTube Monitor Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: youtube-monitor
    env:
      NEXT_PUBLIC_DEBUG: "false"
      NEXT_PUBLIC_CHANNEL_GL: "false"
      NEXT_PUBLIC_ROOM_CONFIG: "DEV"
      NEXT_PUBLIC_API_ENDPOINT: "http://localhost:3000"
      NEXT_PUBLIC_API_KEY: "ci-dummy-api-key"
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: "ci-dummy-project"
      NEXT_PUBLIC_FIREBASE_API_KEY: "ci-dummy-firebase-api-key"
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: youtube-monitor/package.json
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: youtube-monitor/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run build
        run: pnpm build

  docs-site-build:
    name: Docs Site Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: docs-site/package.json
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: docs-site/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run build
        run: pnpm build

  aws-cdk-test:
    name: AWS CDK Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: aws-cdk
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: aws-cdk/package.json
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: aws-cdk/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test
