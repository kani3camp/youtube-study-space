name: Check

on:
  pull_request:

jobs:
  check-i18n-generate:
    name: Generated Files Up-to-Date
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: system
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: system/go.mod

      - name: Download deps
        run: go mod download

      - name: Run go generate
        run: go generate ./...
        env:
          I18N_BASELINE: ja

      - name: Verify no diff
        working-directory: ${{ github.workspace }}
        run: |
          git update-index -q --refresh
          if ! git diff --quiet --exit-code; then
            echo "::error::Generated files are outdated. Please run 'go generate ./...' and commit the changes."
            git diff --name-only
            exit 1
          fi

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: system/go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          working-directory: system
          args: --config=.golangci.yml

  menu-image-generator-lint-build:
    name: Menu Image Generator Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: tools/menu-image-generator
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: tools/menu-image-generator/package.json
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: tools/menu-image-generator/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # 依存関係インストール時（lint/build 用）はブラウザ不要のため Chromium ダウンロードをスキップ（タイムアウト防止）
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 1
          PUPPETEER_SKIP_DOWNLOAD: 1
      - name: Run lint
        run: pnpm lint
      - name: Run build
        run: pnpm build

  biome-lint:
    name: Biome Lint (youtube-monitor)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: youtube-monitor
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: youtube-monitor/package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: youtube-monitor/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run check
        run: pnpm exec biome check . --reporter=github
